spring:
  application:
    name: sub2-monitor
  profiles:
    active: local
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    overwrite-existing-jobs: true
    properties:
      org:
        quartz:
          scheduler:
            instanceName: sub2-monitor-scheduler
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: qrtz_
            isClustered: false
            misfireThreshold: 60000
          threadPool:
            threadCount: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
  jackson:
    default-property-inclusion: non_null
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${SPRING_AI_OPENAI_API_KEY:replace-with-your-openai-api-key}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  datasource:
    main:
      url: ${APP_MAIN_DB_URL:jdbc:postgresql://127.0.0.1:5432/sub2_monitor}
      username: ${APP_MAIN_DB_USERNAME:postgres}
      password: ${APP_MAIN_DB_PASSWORD:replace-with-your-main-db-password}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: Sub2MonitorHikari
        minimum-idle: 2
        maximum-pool-size: 10
        idle-timeout: 300000
        max-lifetime: 1800000
        connection-timeout: 30000
        validation-timeout: 5000

sub2api:
  datasource:
    url: ${SUB2API_DB_URL:jdbc:postgresql://127.0.0.1:5432/sub2api}
    username: ${SUB2API_DB_USERNAME:postgres}
    password: ${SUB2API_DB_PASSWORD:replace-with-your-sub2api-db-password}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      maximum-pool-size: 5
