spring:
  application:
    name: sub2-monitor
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    overwrite-existing-jobs: false
    properties:
      org:
        quartz:
          scheduler:
            instanceName: Sub2MonitorScheduler
            instanceId: AUTO
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: false
            misfireThreshold: 60000
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5s}
  datasource:
    dynamic:
      primary: ${DATASOURCE_PRIMARY:master}
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: ${MYSQL_MASTER_URL:jdbc:mysql://localhost:3306/sub2_monitor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${MYSQL_MASTER_USERNAME:root}
          password: ${MYSQL_MASTER_PASSWORD:root}
        slave:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: ${MYSQL_SLAVE_URL:jdbc:mysql://localhost:3306/sub2_monitor_slave?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
          username: ${MYSQL_SLAVE_USERNAME:root}
          password: ${MYSQL_SLAVE_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${SERVER_PORT:8080}
